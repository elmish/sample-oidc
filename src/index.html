<!doctype html>
<html>
<head>
  <meta http-equiv='Content-Type' content='text/html; charset=utf-8'>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elmish OIDC Sample</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 480px; width: 100%; padding: 1rem; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; text-align: center; }
    h1 { margin-bottom: 1rem; font-size: 1.5rem; }
    h2 { margin-bottom: 0.5rem; font-size: 1.25rem; }
    p { margin-bottom: 0.75rem; color: #555; }
    .detail { font-size: 0.85rem; color: #888; margin-bottom: 0.25rem; }
    .user-info { margin: 1.5rem 0; text-align: left; }
    .btn { display: inline-block; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn-primary { background: #0078d4; color: #fff; }
    .btn-primary:hover { background: #106ebe; }
    .btn-secondary { background: #e1e1e1; color: #333; }
    .btn-secondary:hover { background: #ccc; }
    .loading { text-align: center; color: #888; font-size: 1.1rem; }
    .error { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; border-left: 4px solid #d32f2f; }
    .error h2 { color: #d32f2f; }
  </style>
</head>
<body>
  <div id="elmish-app"></div>
</body>
</html>
